name: MaterialGuardianIOS
options:
  bundleIdPrefix: com.asme
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_NAME: Material Guardian
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  MaterialGuardianIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MaterialGuardianIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.asme.materialguardian.ios
        INFOPLIST_KEY_CFBundleDisplayName: Material Guardian
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_NSCameraUsageDescription: Material Guardian uses the camera for material photos and MTR fallback capture.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Material Guardian can attach existing photos to receiving inspection records.
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
